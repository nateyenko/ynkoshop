<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YNKO | Official Shop</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="restock-banner">
        <div class="banner-content">
            <span>NEXT DROP IN:</span>
            <span id="timer">00:00:00</span>
            <span style="font-size: 0.6rem; opacity: 0.8;">// APRIL 17 @ 1PM QATAR</span>
        </div>
    </div>

    <header>
        <div class="header-left">
            <h1 class="logo">YNKO</h1>
            <a href="https://instagram.com/ynko.drip" target="_blank" class="insta-link">FOLLOW @YNKO.DRIP</a>
        </div>
        <div class="header-right">
            <button class="nav-btn" onclick="toggleOrders()">MY ORDERS</button>
            <div id="cart-count">0</div>
        </div>
    </header>

    <div class="text-marquee">
        <div class="marquee-track">
            <span>NEW DROP // LIMITED STOCK // QATAR DELIVERY // CASH ON DELIVERY // </span>
            <span>NEW DROP // LIMITED STOCK // QATAR DELIVERY // CASH ON DELIVERY // </span>
        </div>
    </div>

    <main class="shop">
        <div class="product-card">
            <div class="img-container">
                <span class="badge">SALE</span>
                <img src="https://res.cloudinary.com/ddmg8kbmo/image/upload/v1774605191/Screenshot_2026-03-27_124850_rfihn0.png" class="img-main">
                <img src="https://res.cloudinary.com/ddmg8kbmo/image/upload/v1774605191/Screenshot_2026-03-27_124904_bugxsj.png" class="img-hover">
            </div>
            <h3>YNKO GT-1 Tee Azure</h3>
            <div class="price-wrapper">
                <span class="old-price">70 QAR</span>
                <span class="sale-red">50 QAR</span>
            </div>
            <div class="controls">
                <select id="size-1"><option>S</option><option selected>M</option><option>L</option></select>
                <button id="stock-btn-1" class="add-btn" onclick="addToCart('YNKO GT-1 Tee Azure', 50, 'size-1')">ADD TO CART</button>
            </div>
        </div>
        </main>

    <div id="orders-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="toggleOrders()">&times;</span>
            <h2>ORDER STATUS</h2>
            <div id="orders-list"></div>
        </div>
    </div>

    <section id="checkout">
        <div class="checkout-container">
            <div id="cart-display"></div>
            <h2 id="final-total">20 QAR</h2>
            <form id="order-form" action="https://formspree.io/f/mwvwkypo" method="POST">
                <input type="text" name="name" placeholder="FULL NAME" required>
                <input type="tel" id="phone-input" name="phone" placeholder="PHONE (8 DIGITS)" oninput="validatePhone()" required>
                <textarea name="address" placeholder="DELIVERY ADDRESS" required></textarea>
                <input type="hidden" name="cart_items" id="cart-input">
                <button type="submit" id="submit-order-btn" class="submit-btn" disabled>PLACE ORDER</button>
            </form>
        </div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
